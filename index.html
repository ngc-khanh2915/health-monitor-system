<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Health Monitor</title>

    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
        padding: 40px;
      }

      .card {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <h1>Dữ liệu sinh tồn</h1>

    <div id="data"></div>

    <script>
      fetch("health-monitor-system-pnhi3.onrender.com/sinh-ton")
        .then((response) => response.json())
        .then((data) => {
          const container = document.getElementById("data");

          data.forEach((row) => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
        <p>Bệnh nhân: ${row.mabenhnhan}</p>
        <p>Nhịp tim: ${row.nhiptim}</p>
        <p>SpO2: ${row.nongdooxy}</p>
        <p>Trạng thái: ${row.trangthai}</p>
      `;

            container.appendChild(div);
          });
        });
    </script>
  </body>
</html>
